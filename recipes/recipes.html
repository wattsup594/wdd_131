<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <meta name="description" content="A recipe book website with searchable recipes.">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A recipe book website with searchable recipes.">
    <meta property="og:image" content="images/social-preview-image.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A recipe book website with searchable recipes.">
    <meta name="twitter:image" content="images/social-preview-image.png">

    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap">
    <link rel="stylesheet" href="recipes.css">
    <script src="recipes.js" defer></script>
</head>

<body>
    <header>
        <img src="images/recipe-book.png" alt="Recipe Book Logo" class="logo">
        <h1>Recipe Book</h1>
    </header>

    <main>
        <form class="search-area" id="search-form">
            <label for="recipe-search" class="sr-only">Find a recipe</label>

            <input 
                type="search" 
                id="recipe-search" 
                placeholder="Find a recipe"
            >

            <button type="submit" aria-label="Search">
                <img src="images/search.svg" alt="">
            </button>
        </form>

        <section id="recipe-output" class="recipe-output"></section>
    </main>

    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>

        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
            <a href="#"><img src="images/instagram_icon.svg" alt="Instagram Icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="Youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="Pinterest icon"></a>
        </div>
    </footer>
</body>
</html>
